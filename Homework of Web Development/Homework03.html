<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Practice | Week2</title>
    <style>
        .grid-container {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: var(--gap);
            padding: 20px;
        }

        .box {
            padding: 20px; 
            border: 2px solid #333; 
            transition: 0.3s;
        }

        .box:hover { 
            background-color: #f1c40f; 
            transform: scale(1.05);
        }

        .special { 
            border: 4px dashed red; 
        }

        .flex-container {
            display: flex; 
            gap: 10px;
            background: #ecf0f1;
            padding: 20px;
        }

        .item-1 { 
            order: 3; 
        } 
        .item-2 { 
            order: 1; 
        } 
        .item-3 { 
            order: 2; 
        } 
        .item-4 { 
            order: -3; 
        }
        .item-5 { 
            order: -2; 
        }
        .item-6 { 
            order: -2; 
        }

        @media (max-width: 576px) {
            .grid-container { 
                grid-template-columns: 1fr; 
            }
        }
    </style>
</head>
<body>
    <br><br><br>
    <main class="grid-container">
        <div class="box item-1">Item 1</div>
        <div class="box itme-2 ">Item 2</div>
        <div class="box item-3 special">Item 3</div>
        <div class="box item-4">Item 4</div>
        <div class="box item-5 special">Item 5</div>
        <div class="box item-6">Item 6</div>
    </main>
</body>
</html>
